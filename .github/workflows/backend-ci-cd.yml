name: Backend CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Run Ruff (Linting & Formatting check)
      run: ruff check . --exit-zero

    - name: Run Mypy (Type checking)
      run: mypy . || true

    - name: Run Pytest with Coverage
      run: |
        pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  build-and-deploy:
    name: Build Docker Image and Deploy to Render
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    defaults:
      run:
        working-directory: backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/webaee-backend:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/webaee-backend:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/webaee-backend:buildcache,mode=max

    - name: Trigger Render Deploy
      if: success()
      run: |
        curl -X GET "${{ secrets.RENDER_DEPLOY_HOOK }}"
