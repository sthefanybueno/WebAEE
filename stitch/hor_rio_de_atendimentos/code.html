<style>
      body {
        font-family: 'Atkinson Hyperlegible', sans-serif;
        background-color: #f5f5f5;

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-white/70 backdrop-blur-xl flex items-center w-full px-4 h-16 docked full-width top-0 z-50 shadow-[0_8px_30px_rgb(28,28,30,0.04)] sticky">
<button aria-label="Voltar" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-primary-light/30 transition-colors active:scale-95">
<span class="material-symbols-outlined text-[#1A6F45]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-lexend font-bold tracking-tight text-on-surface text-lg ml-2">Horário de Atendimentos</h1>
</header>
<!-- Main Canvas -->
<main class="flex-grow px-4 pt-4 pb-24 max-w-md mx-auto w-full">
<!-- Tabs (Day Selector) -->
<section class="mb-8">
<div class="flex gap-3 overflow-x-auto hide-scrollbar pb-2">
<!-- Seg (Active) -->
<button class="flex-shrink-0 bg-primary-container text-white font-bold px-6 py-2.5 rounded-xl shadow-sm transition-all active:scale-95">
                    Seg
                </button>
<!-- Others (Inactive) -->
<button class="flex-shrink-0 bg-surface-container-highest text-on-surface-variant font-medium px-6 py-2.5 rounded-xl transition-all hover:bg-surface-container-high active:scale-95">
                    Ter
                </button>
<button class="flex-shrink-0 bg-surface-container-highest text-on-surface-variant font-medium px-6 py-2.5 rounded-xl transition-all hover:bg-surface-container-high active:scale-95">
                    Qua
                </button>
<button class="flex-shrink-0 bg-surface-container-highest text-on-surface-variant font-medium px-6 py-2.5 rounded-xl transition-all hover:bg-surface-container-high active:scale-95">
                    Qui
                </button>
<button class="flex-shrink-0 bg-surface-container-highest text-on-surface-variant font-medium px-6 py-2.5 rounded-xl transition-all hover:bg-surface-container-high active:scale-95">
                    Sex
                </button>
</div>
</section>
<!-- Timeline List -->
<div class="space-y-6">
<!-- 07:00 - 07:50: [Occupied] -->
<div class="flex gap-4">
<div class="flex flex-col items-center pt-2 w-12">
<span class="text-label-md font-bold text-on-surface-variant opacity-70">07:00</span>
<div class="w-px h-full bg-outline-variant/30 mt-2"></div>
</div>
<div class="flex-grow bg-white rounded-xl border-l-4 border-primary p-4 shadow-[0_4px_12px_rgba(0,0,0,0.03)] flex items-center justify-between">
<div>
<h3 class="font-bold text-on-surface text-lg leading-tight">Artur Mendes</h3>
<span class="inline-block mt-1 bg-primary-light text-on-primary-fixed-variant px-3 py-0.5 rounded-full text-xs font-bold uppercase tracking-wider">E.M. Flores</span>
</div>
<button aria-label="Mais opções" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="more_vert">more_vert</span>
</button>
</div>
</div>

<div class="flex flex-col items-center pt-2 w-12">

</div>
<button class="flex-grow h-16 border-2 border-dashed border-outline-variant rounded-xl flex items-center justify-center gap-2 group hover:border-primary-container transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-[#1A6F45]" data-icon="add_circle">add_circle</span>
<span class="text-[#1A6F45] font-bold">Adicionar Aluno</span>
</button>
</div>

<div class="flex flex-col items-center pt-2 w-12">
<span class="text-label-md font-bold text-on-surface-variant opacity-70">09:00</span>
<div class="w-px h-full bg-outline-variant/30 mt-2"></div>
</div>
<div class="flex-grow bg-surface-container-highest/60 rounded-xl h-12 flex items-center justify-center">
<p class="text-on-surface-variant font-medium flex items-center gap-2">
<span class="material-symbols-outlined text-base" data-icon="coffee">coffee</span>

</div>

</div>

</div>
<button aria-label="Mais opções" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="more_vert">more_vert</span>

</div>

<div class="w-px h-full bg-outline-variant/30 mt-2"></div>
</div>
<button class="flex-grow h-16 border-2 border-dashed border-outline-variant rounded-xl flex items-center justify-center gap-2 group hover:border-primary-container transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-[#1A6F45]" data-icon="add_circle">add_circle</span>
<span class="text-[#1A6F45] font-bold">Adicionar Aluno</span>
</button>
</div>
<!-- 12:00 - 13:00: [ALMOÇO] -->

<span class="text-label-md font-bold text-on-surface-variant opacity-70">12:00</span>

<span class="material-symbols-outlined text-[#1A6F45]" data-icon="add_circle">add_circle</span>
<span class="text-[#1A6F45] font-bold">Adicionar Aluno</span>
</button>
</div>

<span class="material-symbols-outlined text-on-surface-variant" data-icon="more_vert">more_vert</span>

<span class="text-label-md font-bold text-on-surface-variant opacity-70">15:00</span>

</div>
<button class="flex-grow h-16 border-2 border-dashed border-outline-variant rounded-xl flex items-center justify-center gap-2 group hover:border-primary-container transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-[#1A6F45]" data-icon="add_circle">add_circle</span>
<span class="text-[#1A6F45] font-bold">Adicionar Aluno</span>

</div>
